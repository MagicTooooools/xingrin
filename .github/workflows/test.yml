name: Run Tests

on:
  workflow_call:  # 只在被其他 workflow 调用时运行

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run worker tests
        working-directory: worker
        run: make test

      - name: Check repo naming conventions
        run: bash ./scripts/check-repo-naming.sh

      - name: Check server DDD boundaries
        working-directory: server
        run: make check-ddd

      - name: Self-test server DTO guard
        working-directory: server
        run: make check-dto-selftest

      - name: Self-test server repository guard
        working-directory: server
        run: make check-repo-selftest

      - name: Self-test server layer guard
        working-directory: server
        run: make check-layer-selftest

      - name: Self-test server router guard
        working-directory: server
        run: make check-router-selftest

      - name: Self-test server handler guard
        working-directory: server
        run: make check-handler-selftest

      - name: Run server tests
        working-directory: server
        run: make test

      - name: Run agent tests
        working-directory: agent
        run: make test
