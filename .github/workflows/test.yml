name: Run Tests

on:
  workflow_call:  # Run only when called by another workflow

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run worker tests
        working-directory: worker
        run: make test

      - name: Check repo naming conventions
        run: bash ./scripts/check-repo-naming.sh

      - name: Check server DDD boundaries
        working-directory: server
        run: make check-ddd

      - name: Self-test server guards
        working-directory: server
        run: make check-guards-selftest

      - name: Run server tests
        working-directory: server
        run: make test

      - name: Run agent tests
        working-directory: agent
        run: make test
