# ============================================
# 生产环境配置 - 使用 Docker Hub 预构建镜像
# ============================================
# 用法: docker compose -f docker/docker-compose.yml up -d
# 开发环境请使用: docker compose -f docker/docker-compose.dev.yml up -d
# Agent 请通过安装脚本注册启动（/api/agents/install.sh）
# ============================================

services:
  # PostgreSQL（可选，使用远程数据库时不启动）
  postgres:
    profiles: ["local-db"]
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: yyhuni/lunafox-server:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: always
    env_file:
      - .env
    environment:
      - IMAGE_TAG=${IMAGE_TAG}
      - PUBLIC_URL=${PUBLIC_URL:-}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - /opt/lunafox:/opt/lunafox
      - /var/run/docker.sock:/var/run/docker.sock
      - ../VERSION:/app/VERSION:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: yyhuni/lunafox-frontend:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: always
    depends_on:
      server:
        condition: service_healthy

  nginx:
    image: yyhuni/lunafox-nginx:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: always
    depends_on:
      server:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "8083:8083"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro

volumes:
  postgres_data:

networks:
  default:
    name: lunafox_network  # 固定网络名，不随目录名变化
